<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Foretell — Daily Kalshi opportunity scanner. Top 30 best return-to-risk bets updated every day.">
  <title>Foretell — Kalshi Opportunity Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'JetBrains Mono', monospace;
      background: #f5f1e8;
      color: #2d3142;
    }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CATEGORIES = ['ALL', 'WEATHER', 'ECONOMICS', 'COMMODITIES', 'GENERAL', 'SPORTS', 'ENTERTAINMENT'];

    const CopyIcon = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    );

    const CheckIcon = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    );

    function App() {
      const [opportunities, setOpportunities] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedCategory, setSelectedCategory] = useState('ALL');
      const [sortBy, setSortBy] = useState('score');
      const [copiedId, setCopiedId] = useState(null);
      const [lastUpdate, setLastUpdate] = useState(new Date());

      const fetchData = async () => {
        setLoading(true);
        try {
          const response = await fetch('/api/kalshi-markets');
          const data = await response.json();
          
          if (data.success && data.opportunities) {
            setOpportunities(data.opportunities);
            setLastUpdate(new Date());
          }
        } catch (err) {
          console.error('Error:', err);
        }
        setLoading(false);
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, []);

      const copyToClipboard = (opp) => {
        const text = `${opp.title}\n${opp.marketUrl}`;
        navigator.clipboard.writeText(text).then(() => {
          setCopiedId(opp.id);
          setTimeout(() => setCopiedId(null), 2000);
        });
      };

      const filtered = selectedCategory === 'ALL' 
        ? opportunities 
        : opportunities.filter(o => o.category === selectedCategory);

      const sorted = [...filtered].sort((a, b) => {
        if (sortBy === 'score') return b.expectedValue - a.expectedValue;
        if (sortBy === 'probability') return b.probability - a.probability;
        if (sortBy === 'volume') return b.volume - a.volume;
        return 0;
      });

      const topOpps = sorted;
      const avgWinProb = topOpps.length > 0 
        ? topOpps.reduce((sum, o) => sum + o.probability, 0) / topOpps.length 
        : 0;
      const avgReturn = topOpps.length > 0
        ? topOpps.reduce((sum, o) => sum + ((1 / o.yesPrice) - 1), 0) / topOpps.length
        : 0;

      const formatTime = (date) => {
        const hours = date.getHours().toString().padStart(2, '0');
        const mins = date.getMinutes().toString().padStart(2, '0');
        return `${hours}:${mins}`;
      };

      return (
        <div style={{ minHeight: '100vh', background: '#f5f1e8' }}>
          {/* Top Nav */}
          <div style={{
            background: '#fff',
            borderBottom: '1px solid #e0d9ca',
            padding: '16px 40px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <div style={{
                width: '32px',
                height: '32px',
                background: '#3d405b',
                borderRadius: '4px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center'
              }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5">
                  <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                  <polyline points="17 6 23 6 23 12"></polyline>
                </svg>
              </div>
              <span style={{ fontWeight: 700, fontSize: '18px', fontFamily: 'Syne', color: '#2d3142' }}>Foretell</span>
            </div>
            
            <div style={{ 
              fontSize: '10px', 
              color: '#999', 
              letterSpacing: '0.8px',
              fontFamily: 'JetBrains Mono',
              fontWeight: 400
            }}>
              <span style={{ 
                background: '#f0f0f0',
                padding: '4px 8px',
                borderRadius: '3px',
                fontWeight: 500
              }}>KALSHI SCANNER</span>
              <span style={{ margin: '0 8px' }}>{opportunities.length} scanned</span>
            </div>
          </div>

          {/* Hero */}
          <div style={{
            background: 'linear-gradient(135deg, #454959 0%, #3d405b 100%)',
            padding: '64px 40px 56px',
            color: '#fff'
          }}>
            <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
              <h1 style={{
                fontSize: '52px',
                fontWeight: 800,
                marginBottom: '20px',
                lineHeight: 1.15,
                fontFamily: 'Syne'
              }}>
                Today's top <span style={{ color: '#81b29a' }}>{topOpps.length}</span><br/>
                Kalshi opportunities.
              </h1>
              
              <p style={{
                fontSize: '13px',
                color: '#b5b8c8',
                maxWidth: '620px',
                lineHeight: 1.7,
                fontFamily: 'JetBrains Mono',
                fontWeight: 300,
                marginBottom: '48px'
              }}>
                High-probability, short-horizon positions ranked by<br/>
                expected value — calibrated against real trade history.
              </p>

              {/* Stats Grid */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(4, 1fr)',
                gap: '32px',
                maxWidth: '800px'
              }}>
                {[
                  { label: 'OPPORTUNITIES', value: topOpps.length },
                  { label: 'AVG WIN PROB', value: (avgWinProb * 100).toFixed(0) + '%' },
                  { label: 'AVG RETURN', value: (avgReturn * 100).toFixed(1) + '%' },
                  { label: 'LAST UPDATED', value: formatTime(lastUpdate) }
                ].map((stat, i) => (
                  <div key={i}>
                    <div style={{ fontSize: '32px', fontWeight: 700, marginBottom: '6px', fontFamily: 'Syne' }}>
                      {stat.value}
                    </div>
                    <div style={{ 
                      fontSize: '9px', 
                      color: '#70738a', 
                      letterSpacing: '1.2px', 
                      fontWeight: 500,
                      textTransform: 'uppercase'
                    }}>
                      {stat.label}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Filters */}
          <div style={{
            background: '#fff',
            borderBottom: '1px solid #e0d9ca',
            padding: '0 40px'
          }}>
            <div style={{ maxWidth: '1400px', margin: '0 auto', display: 'flex', gap: '0' }}>
              {CATEGORIES.map(cat => {
                const count = cat === 'ALL' 
                  ? opportunities.length 
                  : opportunities.filter(o => o.category === cat).length;
                const isActive = selectedCategory === cat;
                
                return (
                  <button
                    key={cat}
                    onClick={() => setSelectedCategory(cat)}
                    style={{
                      padding: '18px 0',
                      marginRight: '32px',
                      background: 'transparent',
                      border: 'none',
                      borderBottom: isActive ? '2px solid #3d405b' : '2px solid transparent',
                      color: isActive ? '#2d3142' : '#999',
                      fontSize: '10px',
                      fontWeight: 500,
                      letterSpacing: '0.8px',
                      cursor: 'pointer',
                      fontFamily: 'JetBrains Mono',
                      transition: 'all 0.2s'
                    }}
                  >
                    {cat} <span style={{ 
                      marginLeft: '6px',
                      color: isActive ? '#2d3142' : '#ccc'
                    }}>{count}</span>
                  </button>
                );
              })}
              
              <div style={{ flex: 1 }}></div>
              
              <div style={{ display: 'flex', alignItems: 'center', gap: '16px', padding: '18px 0' }}>
                <div style={{ fontSize: '10px', color: '#999', fontWeight: 500, letterSpacing: '0.8px' }}>SORT</div>
                <select
                  value={sortBy}
                  onChange={(e) => setSortBy(e.target.value)}
                  style={{
                    padding: '6px 12px',
                    border: '1px solid #e0d9ca',
                    borderRadius: '3px',
                    fontSize: '10px',
                    fontWeight: 500,
                    fontFamily: 'JetBrains Mono',
                    background: '#fff',
                    cursor: 'pointer',
                    color: '#666'
                  }}
                >
                  <option value="score">Best score</option>
                  <option value="probability">Highest probability</option>
                  <option value="volume">Most volume</option>
                </select>
                
                <button
                  onClick={fetchData}
                  disabled={loading}
                  style={{
                    padding: '6px 16px',
                    background: '#fff',
                    border: '1px solid #e0d9ca',
                    borderRadius: '3px',
                    fontSize: '10px',
                    fontWeight: 500,
                    cursor: loading ? 'not-allowed' : 'pointer',
                    fontFamily: 'JetBrains Mono',
                    color: '#666',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '6px',
                    letterSpacing: '0.5px'
                  }}
                >
                  🔄 REFRESH
                </button>
              </div>
            </div>
          </div>

          {/* Cards Grid or Empty State */}
          <div style={{ maxWidth: '1400px', margin: '0 auto', padding: '48px 40px 80px' }}>
            {loading ? (
              <div style={{ textAlign: 'center', padding: '120px 0', color: '#999' }}>
                <div style={{ fontSize: '14px', fontFamily: 'JetBrains Mono', fontWeight: 300 }}>
                  Loading opportunities...
                </div>
              </div>
            ) : topOpps.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '120px 40px' }}>
                <h2 style={{
                  fontSize: '28px',
                  fontWeight: 700,
                  marginBottom: '12px',
                  fontFamily: 'Syne',
                  color: '#2d3142'
                }}>
                  No opportunities found
                </h2>
                <p style={{
                  fontSize: '12px',
                  color: '#999',
                  fontFamily: 'JetBrains Mono',
                  fontWeight: 300,
                  lineHeight: 1.7
                }}>
                  No markets in scoring range right now. Check back<br/>
                  soon or hit refresh.
                </p>
              </div>
            ) : (
              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(360px, 1fr))',
                gap: '20px'
              }}>
                {topOpps.map((opp, idx) => {
                  const buyYes = opp.probability > 0.5;
                  const entryPrice = opp.yesPrice;
                  const returnPct = ((1 / entryPrice) - 1) * 100;
                  const expValue = opp.expectedValue * 100;

                  return (
                    <div
                      key={opp.id}
                      style={{
                        background: '#fff',
                        border: '1px solid #e0d9ca',
                        borderRadius: '6px',
                        padding: '20px',
                        animation: `fadeIn 0.3s ease ${idx * 0.03}s both`,
                        position: 'relative'
                      }}
                    >
                      {/* Number */}
                      <div style={{
                        position: 'absolute',
                        top: '16px',
                        left: '16px',
                        fontSize: '11px',
                        fontWeight: 600,
                        color: '#ccc',
                        fontFamily: 'JetBrains Mono'
                      }}>
                        {idx + 1}
                      </div>

                      {/* Badges */}
                      <div style={{ display: 'flex', gap: '8px', marginBottom: '14px', paddingLeft: '28px', flexWrap: 'wrap' }}>
                        <span style={{
                          padding: '3px 8px',
                          background: '#edf4f0',
                          color: '#5a9179',
                          borderRadius: '3px',
                          fontSize: '9px',
                          fontWeight: 600,
                          letterSpacing: '0.5px',
                          textTransform: 'uppercase',
                          fontFamily: 'JetBrains Mono'
                        }}>
                          {opp.category}
                        </span>
                        
                        <span style={{
                          padding: '3px 8px',
                          background: buyYes ? '#edf4f0' : '#ffe7e7',
                          color: buyYes ? '#5a9179' : '#c24040',
                          borderRadius: '3px',
                          fontSize: '9px',
                          fontWeight: 600,
                          letterSpacing: '0.5px',
                          fontFamily: 'JetBrains Mono'
                        }}>
                          {buyYes ? 'YES' : 'NO'}
                        </span>

                        <span style={{
                          padding: '3px 8px',
                          background: '#f5f5f5',
                          color: '#888',
                          borderRadius: '3px',
                          fontSize: '9px',
                          fontWeight: 500,
                          fontFamily: 'JetBrains Mono'
                        }}>
                          closes in {opp.expiryDays}d
                        </span>
                      </div>

                      {/* Title */}
                      <h3 style={{
                        fontSize: '14px',
                        fontWeight: 600,
                        lineHeight: 1.5,
                        marginBottom: '12px',
                        color: '#2d3142',
                        minHeight: '42px',
                        fontFamily: 'Syne'
                      }}>
                        {opp.title.length > 120 ? opp.title.substring(0, 120) + '...' : opp.title}
                      </h3>

                      {/* Description */}
                      <div style={{
                        fontSize: '10px',
                        color: '#888',
                        marginBottom: '14px',
                        lineHeight: 1.5,
                        fontFamily: 'JetBrains Mono',
                        fontWeight: 300
                      }}>
                        Buy <strong>{buyYes ? 'NO' : 'YES'}</strong> — profit if <strong>{(opp.probability * 100).toFixed(0)}%</strong> to <strong>{(buyYes ? opp.probability * 100 - 10 : opp.probability * 100 + 10).toFixed(0)}%</strong>
                      </div>

                      {/* Metrics */}
                      <div style={{
                        display: 'grid',
                        gridTemplateColumns: 'repeat(4, 1fr)',
                        gap: '10px',
                        background: '#fafaf8',
                        padding: '12px',
                        borderRadius: '4px',
                        marginBottom: '12px'
                      }}>
                        {[
                          { label: 'ENTRY', value: `$${entryPrice.toFixed(2)}` },
                          { label: 'IMPLIED', value: `${(opp.probability * 100).toFixed(0)}%` },
                          { label: 'RETURN', value: `+${returnPct.toFixed(1)}%` },
                          { label: 'EXP. VALUE', value: `+${expValue.toFixed(0)}¢` }
                        ].map((m, i) => (
                          <div key={i}>
                            <div style={{ 
                              fontSize: '7px', 
                              color: '#aaa', 
                              marginBottom: '4px', 
                              fontWeight: 500, 
                              letterSpacing: '0.5px',
                              fontFamily: 'JetBrains Mono'
                            }}>
                              {m.label}
                            </div>
                            <div style={{
                              fontSize: '13px',
                              fontWeight: 600,
                              color: '#2d3142',
                              fontFamily: 'JetBrains Mono'
                            }}>
                              {m.value}
                            </div>
                          </div>
                        ))}
                      </div>

                      {/* Footer text */}
                      <div style={{
                        fontSize: '9px',
                        color: '#aaa',
                        marginBottom: '10px',
                        lineHeight: 1.5,
                        fontFamily: 'JetBrains Mono',
                        fontWeight: 300
                      }}>
                        {(opp.probability * 100).toFixed(0)}% hist. win • +{returnPct.toFixed(1)}% return • +{expValue.toFixed(0)}¢ EV • closes {opp.expiryDays}d • tight spread
                      </div>

                      {/* Progress bar */}
                      <div style={{
                        height: '4px',
                        background: '#f0f0f0',
                        borderRadius: '2px',
                        overflow: 'hidden',
                        marginBottom: '12px'
                      }}>
                        <div style={{
                          width: `${Math.min((expValue / 15) * 100, 100)}%`,
                          height: '100%',
                          background: 'linear-gradient(90deg, #81b29a 0%, #5a9179 100%)'
                        }}></div>
                      </div>

                      {/* Buttons */}
                      <div style={{ display: 'flex', gap: '8px' }}>
                        <button
                          onClick={() => copyToClipboard(opp)}
                          style={{
                            padding: '8px',
                            background: copiedId === opp.id ? '#edf4f0' : '#fafaf8',
                            border: '1px solid #e0d9ca',
                            borderRadius: '4px',
                            fontSize: '10px',
                            fontWeight: 500,
                            cursor: 'pointer',
                            fontFamily: 'JetBrains Mono',
                            color: copiedId === opp.id ? '#5a9179' : '#888',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            gap: '6px',
                            letterSpacing: '0.3px',
                            flex: '0 0 auto'
                          }}
                        >
                          {copiedId === opp.id ? <CheckIcon /> : <CopyIcon />}
                          COPY TO CLIPBOARD
                        </button>

                        <a
                          href={opp.marketUrl}
                          target="_blank"
                          rel="noopener noreferrer"
                          style={{
                            flex: 1,
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            padding: '8px',
                            background: '#3d405b',
                            color: '#fff',
                            textDecoration: 'none',
                            borderRadius: '4px',
                            fontSize: '10px',
                            fontWeight: 600,
                            fontFamily: 'JetBrains Mono',
                            letterSpacing: '0.5px'
                          }}
                        >
                          TRADE ON KALSHI →
                        </a>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{
            background: '#3d405b',
            color: '#b5b8c8',
            padding: '32px 40px',
            borderTop: '1px solid rgba(255,255,255,0.05)',
            fontSize: '11px',
            fontFamily: 'JetBrains Mono',
            fontWeight: 300
          }}>
            <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
              <div style={{ marginBottom: '16px' }}>
                <span style={{ fontWeight: 600, color: '#fff', fontFamily: 'Syne' }}>Foretell</span>
              </div>
              <div style={{ marginBottom: '12px', lineHeight: 1.7 }}>
                Data sourced from the <span style={{ fontWeight: 500 }}>Kalshi</span> public API. Not financial advice.
              </div>
              <div style={{ color: '#70738a', fontSize: '10px', lineHeight: 1.7 }}>
                On winner markets, <strong>YES pill</strong> = buy YES on Kalshi • <strong>NO pill</strong> = buy NO on Kalshi
                <br/>
                For avg return: dividing NO means you're betting the named team/player <strong>Foretell score</strong> = composite edge × RR (EV ÷ price band × liquidity × spread × horizon) • <strong>Risk 1–10</strong> = 1 very safe, 10 very risky
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
