<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foretell</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', monospace; background: #f5f0e8; color: #2d3142; }
    h1, h2, h3 { font-family: 'Syne', sans-serif; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [opps, setOpps] = useState([]);
      const [loading, setLoading] = useState(true);
      const [cat, setCat] = useState('ALL');
      const [copied, setCopied] = useState(null);

      useEffect(() => {
        fetch('/api/kalshi-markets')
          .then(r => r.json())
          .then(d => { setOpps(d.opportunities || []); setLoading(false); })
          .catch(() => setLoading(false));
      }, []);

      const filtered = cat === 'ALL' ? opps : opps.filter(o => o.category === cat);
      const avgWin = filtered.length ? filtered.reduce((s,o) => s + o.probability, 0) / filtered.length : 0;
      const avgRet = filtered.length ? filtered.reduce((s,o) => s + ((1/o.yesPrice)-1), 0) / filtered.length : 0;

      return (
        <div style={{minHeight:'100vh'}}>
          <div style={{background:'#fff',borderBottom:'1px solid #ddd',padding:'16px 40px',display:'flex',justifyContent:'space-between'}}>
            <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
              <div style={{width:'28px',height:'28px',background:'#3d405b',borderRadius:'3px'}}></div>
              <span style={{fontWeight:700,fontSize:'16px'}}>Foretell</span>
            </div>
            <div style={{fontSize:'10px',color:'#999'}}>
              KALSHI SCANNER
            </div>
          </div>

          <div style={{background:'linear-gradient(135deg, #454959 0%, #3d405b 100%)',padding:'60px 40px',color:'#fff'}}>
            <h1 style={{fontSize:'50px',fontWeight:800,marginBottom:'16px'}}>
              Today's top <span style={{color:'#81b29a'}}>{filtered.length}</span><br/>Kalshi opportunities.
            </h1>
            <p style={{fontSize:'12px',color:'#b5b8c8',marginBottom:'40px'}}>
              High-probability, short-horizon positions ranked by<br/>expected value — calibrated against real trade history.
            </p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'24px',maxWidth:'700px'}}>
              <div><div style={{fontSize:'28px',fontWeight:700}}>{filtered.length}</div><div style={{fontSize:'9px',color:'#888',textTransform:'uppercase'}}>Opportunities</div></div>
              <div><div style={{fontSize:'28px',fontWeight:700}}>{(avgWin*100).toFixed(0)}%</div><div style={{fontSize:'9px',color:'#888',textTransform:'uppercase'}}>Avg Win Prob</div></div>
              <div><div style={{fontSize:'28px',fontWeight:700}}>{(avgRet*100).toFixed(1)}%</div><div style={{fontSize:'9px',color:'#888',textTransform:'uppercase'}}>Avg Return</div></div>
              <div><div style={{fontSize:'28px',fontWeight:700}}>{new Date().getHours()}:{String(new Date().getMinutes()).padStart(2,'0')}</div><div style={{fontSize:'9px',color:'#888',textTransform:'uppercase'}}>Last Updated</div></div>
            </div>
          </div>

          <div style={{background:'#fff',borderBottom:'1px solid #ddd',padding:'0 40px',display:'flex',gap:'24px'}}>
            {['ALL','WEATHER','ECONOMICS','COMMODITIES','GENERAL','SPORTS','ENTERTAINMENT'].map(c => {
              const count = c === 'ALL' ? opps.length : opps.filter(o => o.category === c).length;
              return (
                <button key={c} onClick={() => setCat(c)} style={{
                  padding:'16px 0',background:'none',border:'none',borderBottom:cat===c?'2px solid #3d405b':'2px solid transparent',
                  color:cat===c?'#000':'#999',fontSize:'10px',fontWeight:500,cursor:'pointer'
                }}>
                  {c} {count}
                </button>
              );
            })}
          </div>

          <div style={{padding:'40px',maxWidth:'1400px',margin:'0 auto'}}>
            {loading ? (
              <div style={{textAlign:'center',padding:'80px',color:'#999'}}>Loading...</div>
            ) : filtered.length === 0 ? (
              <div style={{textAlign:'center',padding:'80px'}}>
                <h2 style={{fontSize:'24px',marginBottom:'8px'}}>No opportunities found</h2>
                <p style={{fontSize:'12px',color:'#999'}}>No markets in scoring range right now. Check back soon or hit refresh.</p>
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(350px,1fr))',gap:'20px'}}>
                {filtered.map((o,i) => {
                  const buyYes = o.probability > 0.5;
                  const ret = ((1/o.yesPrice)-1)*100;
                  const ev = o.expectedValue*100;
                  return (
                    <div key={o.id} style={{background:'#fff',border:'1px solid #ddd',borderRadius:'6px',padding:'20px',position:'relative'}}>
                      <div style={{position:'absolute',top:'16px',left:'16px',fontSize:'11px',color:'#ccc',fontWeight:600}}>{i+1}</div>
                      <div style={{display:'flex',gap:'8px',marginBottom:'12px',paddingLeft:'28px',flexWrap:'wrap'}}>
                        <span style={{padding:'3px 8px',background:'#edf4f0',color:'#5a9179',borderRadius:'3px',fontSize:'9px',fontWeight:600}}>{o.category}</span>
                        <span style={{padding:'3px 8px',background:buyYes?'#edf4f0':'#ffe7e7',color:buyYes?'#5a9179':'#c24040',borderRadius:'3px',fontSize:'9px',fontWeight:600}}>{buyYes?'YES':'NO'}</span>
                        <span style={{padding:'3px 8px',background:'#f5f5f5',color:'#888',borderRadius:'3px',fontSize:'9px',fontWeight:500'}}>closes in {o.expiryDays}d</span>
                      </div>
                      <h3 style={{fontSize:'14px',fontWeight:600,marginBottom:'10px',minHeight:'42px',lineHeight:1.4}}>{o.title.substring(0,120)}{o.title.length>120?'...':''}</h3>
                      <p style={{fontSize:'10px',color:'#888',marginBottom:'12px'}}>Buy <strong>{buyYes?'NO':'YES'}</strong> — profit if <strong>{(o.probability*100).toFixed(0)}%</strong> to <strong>{(buyYes?o.probability*100-10:o.probability*100+10).toFixed(0)}%</strong></p>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',background:'#fafaf8',padding:'12px',borderRadius:'4px',marginBottom:'12px'}}>
                        {[
                          {l:'ENTRY',v:`$${o.yesPrice.toFixed(2)}`},
                          {l:'IMPLIED',v:`${(o.probability*100).toFixed(0)}%`},
                          {l:'RETURN',v:`+${ret.toFixed(1)}%`},
                          {l:'EXP. VALUE',v:`+${ev.toFixed(0)}¢`}
                        ].map((m,j) => (
                          <div key={j}>
                            <div style={{fontSize:'7px',color:'#aaa',marginBottom:'3px',fontWeight:500}}>{m.l}</div>
                            <div style={{fontSize:'13px',fontWeight:600,color:'#2d3142'}}>{m.v}</div>
                          </div>
                        ))}
                      </div>
                      <p style={{fontSize:'9px',color:'#aaa',marginBottom:'10px'}}>{(o.probability*100).toFixed(0)}% hist. win • +{ret.toFixed(1)}% return • +{ev.toFixed(0)}¢ EV • closes {o.expiryDays}d • tight spread</p>
                      <div style={{height:'4px',background:'#f0f0f0',borderRadius:'2px',marginBottom:'12px',overflow:'hidden'}}>
                        <div style={{width:`${Math.min((ev/15)*100,100)}%`,height:'100%',background:'linear-gradient(90deg, #81b29a 0%, #5a9179 100%)'}}></div>
                      </div>
                      <div style={{display:'flex',gap:'8px'}}>
                        <button onClick={() => {navigator.clipboard.writeText(o.title+'\n'+o.marketUrl); setCopied(o.id); setTimeout(()=>setCopied(null),2000);}}
                          style={{padding:'8px',background:copied===o.id?'#edf4f0':'#fafaf8',border:'1px solid #ddd',borderRadius:'4px',fontSize:'10px',fontWeight:500,cursor:'pointer',color:copied===o.id?'#5a9179':'#888',flex:'0 0 auto'}}>
                          📋 COPY TO CLIPBOARD
                        </button>
                        <a href={o.marketUrl} target="_blank" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'8px',background:'#3d405b',color:'#fff',textDecoration:'none',borderRadius:'4px',fontSize:'10px',fontWeight:600'}}>
                          TRADE ON KALSHI →
                        </a>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          <div style={{background:'#3d405b',color:'#b5b8c8',padding:'32px 40px',fontSize:'11px'}}>
            <div><span style={{fontWeight:600,color:'#fff'}}>Foretell</span></div>
            <div style={{marginTop:'12px'}}>Data sourced from the <span style={{fontWeight:500}}>Kalshi</span> public API. Not financial advice.</div>
            <div style={{color:'#70738a',fontSize:'10px',marginTop:'8px'}}>
              On winner markets, <strong>YES pill</strong> = buy YES on Kalshi • <strong>NO pill</strong> = buy NO on Kalshi<br/>
              <strong>Foretell score</strong> = composite edge × RR (EV ÷ price band × liquidity × spread × horizon) • <strong>Risk 1–10</strong> = 1 very safe, 10 very risky
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
